name: CI

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    name: 3.4
    steps:
    - uses: actions/checkout@v6
    - name: OpenBSD Test
      id: test
      uses: vmactions/openbsd-vm@v1
      with:
        prepare: |
          pkg_add ruby34-pledge ruby34-unicorn nginx
          gem34 install -N mail roda minitest-global_expectations
          groupadd _unicorn
        run: |
          rake34 test_ci
